---
const { title = "FSC Westerstede" } = Astro.props;
---

<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />

    <title>Fallschirmsport-Club Westerstede e.V.</title>

    <style>
      :root {
        --bg: #0a0f1c;
        --card: #121a2b;
        --accent: #4f7cff;
        --text: #e6eaf2;
        --muted: #9aa4b2;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: Arial;
        line-height: 1.6;
      }

      nav {
        position: sticky;
        top: 0;
        background: rgba(10,15,28,0.9);
        backdrop-filter: blur(10px);
        border-bottom: 1px solid rgba(255,255,255,0.05);
        padding: 18px 30px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        z-index: 999;
      }

      nav a {
        color: white;
        text-decoration: none;
        margin-left: 20px;
      }

      nav a:hover {
        color: var(--accent);
      }

      .logo {
        font-weight: bold;
        font-size: 1.1rem;
      }

      main {
        max-width: 1100px;
        margin: auto;
        padding: 50px 20px;
      }

      footer {
        margin-top: 80px;
        padding: 40px 20px;
        text-align: center;
        color: var(--muted);
        border-top: 1px solid rgba(255,255,255,0.05);
      }

      .card {
        background: var(--card);
        padding: 24px;
        border-radius: 16px;
        border: 1px solid rgba(255,255,255,0.05);
      }

      @media (max-width: 700px) {
        nav {
          flex-direction: column;
          gap: 10px;
        }
      }
    </style>
  </head>

  <body>

    <nav>
      <div class="logo">
        🚀 FSC Westerstede
      </div>

      <div>
        <a href="/">Home</a>
        <a href="/news">News</a>
        <a href="/events">Events</a>
      </div>
    </nav>

    <main>
      <slot />
    </main>

    <footer>
      © 2026 Fallschirmsport-Club Westerstede e.V.
    </footer>

  </body>
</html>
